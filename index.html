<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="todo-card-wrapper" class="todo-card-wrapper wrapper--high">

    <span
      data-testid="test-todo-priority"
      class="todo-card__priority-label"
      aria-label="High priority"
    >URGENT</span>

    <article
      data-testid="test-todo-card"
      id="todo-card"
      class="todo-card"
      aria-label="Todo task card"
    >

      <!-- Checkbox + Title -->
      <div class="todo-card__title-row">
        <label class="todo-card__checkbox-label" for="todo-complete">
          <input
            id="todo-complete"
            type="checkbox"
            data-testid="test-todo-complete-toggle"
            class="todo-card__checkbox"
            aria-label="Mark task as complete"
          />
          <span class="todo-card__checkbox-custom" aria-hidden="true"></span>
        </label>

        <h2
          data-testid="test-todo-title"
          id="todo-title"
          class="todo-card__title"
        >
          Build a Testable Todo Item Card
        </h2>
      </div>

      <!-- Description -->
      <p data-testid="test-todo-description" class="todo-card__description">
        Designing the basic structure of the Todo Card component. Focus on
        accessibility, semantic HTML, and all required testid attributes…
      </p>

      <!-- Tags + Status -->
      <div class="todo-card__middle-row">
        <ul
          data-testid="test-todo-tags"
          class="todo-card__tags"
          role="list"
          aria-label="Task tags"
        >
          <li role="listitem">
            <span data-testid="test-todo-tag-work" class="todo-card__tag todo-card__tag--work">Work</span>
          </li>
          <li role="listitem">
            <span data-testid="test-todo-tag-urgent" class="todo-card__tag todo-card__tag--urgent">Urgent</span>
          </li>
          <li role="listitem">
            <span data-testid="test-todo-tag-design" class="todo-card__tag todo-card__tag--design">Design</span>
          </li>
        </ul>

        <span
          data-testid="test-todo-status"
          id="todo-status"
          class="todo-card__status-badge status--in-progress"
          aria-label="Status: In Progress"
        >In Progress</span>
      </div>

      <!-- Bottom row -->
      <div class="todo-card__bottom-row">
        <div class="todo-card__bottom-left">

          <button
            data-testid="test-todo-edit-button"
            class="todo-card__icon-btn"
            type="button"
            aria-label="Edit task"
            onclick="handleEdit()"
          >
            <svg aria-hidden="true" focusable="false" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            Edit
          </button>

          <button
            data-testid="test-todo-delete-button"
            class="todo-card__icon-btn todo-card__icon-btn--delete"
            type="button"
            aria-label="Delete task"
            onclick="handleDelete()"
          >
            <svg aria-hidden="true" focusable="false" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
            Delete
          </button>

          <time
            data-testid="test-todo-time-remaining"
            id="time-remaining"
            class="todo-card__time-remaining"
            datetime="2026-04-16T18:00:00Z"
            aria-live="polite"
            aria-atomic="true"
          >
            <svg aria-hidden="true" focusable="false" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            <span id="time-remaining-text"></span>
          </time>

        </div>

        <time
          data-testid="test-todo-due-date"
          id="due-date"
          class="todo-card__due-date"
          datetime="2026-04-16T18:00:00Z"
          aria-label="Due date: Apr 16, 2026"
        ></time>
      </div>

    </article>
  </div>

  <script src="script.js"></script>
</body>
</html>
